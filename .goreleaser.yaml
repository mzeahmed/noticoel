# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: noticeal

before:
  hooks:
    - go -C app mod tidy

builds:
  - dir: app
    main: ./cmd
    binary: noticeal
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/mzeahmed/noticeal/internal/version.Version={{.Version}}

archives:
  - formats: [tar.gz]
    # Matches the OS/Arch naming `uname` would report.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

# Version string used for local builds (`--snapshot`), which have no git tag.
snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^ci:"
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto

# Build and publish OCI images without a Dockerfile.
# Images are pushed to the GitHub Container Registry (GHCR)
# and can be deployed with Docker or any OCI-compatible runtime.
kos:
  - id: noticeal

    build: noticeal

    repositories:
      - ghcr.io/mzeahmed/noticeal

    tags:
      - "{{ .Version }}"
      - latest
